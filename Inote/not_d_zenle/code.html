<!DOCTYPE html>

<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Not Düzenleyici</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* Custom scrollbar for text area */
        textarea::-webkit-scrollbar {
            width: 6px;
        }

        textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb {
            background-color: rgba(142, 148, 242, 0.3);
            border-radius: 10px;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c7c5d3",
                        "on-primary-fixed-variant": "#373c95",
                        "on-tertiary-container": "#4c225a",
                        "on-tertiary-fixed-variant": "#61356f",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-fixed": "#082007",
                        "surface": "#f8f9ff",
                        "on-primary-container": "#232781",
                        "secondary-container": "#c9e8bf",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "tertiary": "#7b4d88",
                        "on-primary-fixed": "#02026b",
                        "secondary-fixed-dim": "#b1cfa7",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "inverse-primary": "#bfc2ff",
                        "primary-container": "#8e94f2",
                        "surface-container-high": "#dce9ff",
                        "primary": "#4f55ae",
                        "surface-tint": "#4f55ae",
                        "surface-variant": "#d3e4fe",
                        "on-error": "#ffffff",
                        "primary-fixed": "#e0e0ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-fixed": "#310540",
                        "inverse-surface": "#213145",
                        "secondary-fixed": "#ccebc2",
                        "on-secondary-container": "#4f6a49",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed-dim": "#bfc2ff",
                        "tertiary-fixed": "#fad7ff",
                        "on-primary": "#ffffff",
                        "secondary": "#4a6545",
                        "tertiary-fixed-dim": "#eab4f7",
                        "on-secondary-fixed-variant": "#334d2f",
                        "on-surface-variant": "#464652",
                        "outline": "#767683",
                        "surface-container": "#e5eeff",
                        "tertiary-container": "#bd8aca"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1rem",
                        "xs": "0.25rem",
                        "lg": "1.5rem",
                        "md": "1rem",
                        "sm": "0.5rem",
                        "xl": "2.5rem",
                        "layout_margin": "2rem"
                    },
                    "fontFamily": {
                        "sans": ["'Plus Jakarta Sans'", "sans-serif"]
                    },
                    "fontSize": {
                        "body-sm": ["0.875rem", { "lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "label-caps": ["0.75rem", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-md": ["1rem", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "button": ["0.9375rem", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-lg": ["1.125rem", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "h3": ["1.5rem", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600" }],
                        "h1": ["2.5rem", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h2": ["1.875rem", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col relative overflow-hidden">
    <!-- Top App Bar (Modified for transactional view) -->
    <header
        class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/70 backdrop-blur-lg no-border shadow-[0_4px_20px_rgba(142,148,242,0.08)]">
        <button
            class="text-primary-container hover:bg-slate-100/50 rounded-full p-2 transition-all duration-300 ease-in-out active:scale-95 flex items-center justify-center">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <!-- Status indicator (optional, showing saving state) -->
        <div class="text-xs text-outline-variant flex items-center gap-1 font-body-sm opacity-0">
            <span class="material-symbols-outlined text-[16px]">cloud_done</span> Kaydedildi
        </div>
        <button
            class="bg-primary-container text-white px-6 py-2 rounded-full font-button shadow-[0_4px_20px_rgba(142,148,242,0.2)] hover:bg-primary transition-all duration-300 active:scale-95">
            Kaydet
        </button>
    </header>
    <!-- Main Content Area -->
    <main class="flex-grow pt-24 pb-20 px-6 md:px-layout_margin max-w-3xl mx-auto w-full flex flex-col relative z-10">
        <!-- Metadata row -->
        <div class="flex items-center gap-3 mb-6 text-outline font-body-sm">
            <span
                class="bg-primary-container/10 text-primary-container px-3 py-1 rounded-full text-xs font-medium">Kişisel</span>
            <span>12 Ekim, 14:30</span>
        </div>
        <!-- Title Input -->
        <input
            class="w-full bg-transparent border-none outline-none font-h1 text-on-background placeholder:text-outline-variant/60 focus:ring-0 p-0 mb-6"
            placeholder="Başlık" type="text" value="Yeni Fikirler ve Projeler" />
        <!-- Body Text Area -->
        <textarea
            class="w-full flex-grow bg-transparent border-none outline-none font-body-lg text-on-surface placeholder:text-outline-variant/50 focus:ring-0 p-0 resize-none h-[530px] leading-relaxed"
            placeholder="Notunuzu buraya yazın...">Bu projede minimalizmi ön planda tutarak, kullanıcı deneyimini iyileştirmeye odaklanmalıyız. 

Öncelikli görevler:
- Ana sayfa tasarımını sadeleştir.
- Renk paletini gözden geçir (daha soft tonlar).
- Tipografik hiyerarşiyi netleştir.</textarea>
    </main>
    <!-- Formatting Toolbar (Fixed at bottom) -->
    <div
        class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl border-t border-slate-100/10 shadow-[0_-8px_30px_rgba(142,148,242,0.12)] rounded-t-[32px]">
        <div class="flex items-center gap-2 md:gap-4 max-w-md w-full justify-around px-4">
            <button
                class="p-3 text-slate-400 hover:text-primary-container hover:bg-primary-container/10 rounded-xl transition-all duration-200 active:scale-90 flex items-center justify-center">
                <span class="material-symbols-outlined" data-icon="format_bold">format_bold</span>
            </button>
            <button
                class="p-3 text-slate-400 hover:text-primary-container hover:bg-primary-container/10 rounded-xl transition-all duration-200 active:scale-90 flex items-center justify-center">
                <span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
            </button>
            <div class="w-px h-6 bg-outline-variant/30 mx-2"></div>
            <button
                class="p-3 text-primary-container bg-primary-container/10 rounded-xl transition-all duration-200 active:scale-90 flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined" data-icon="checklist">checklist</span>
            </button>
            <button
                class="p-3 text-slate-400 hover:text-primary-container hover:bg-primary-container/10 rounded-xl transition-all duration-200 active:scale-90 flex items-center justify-center">
                <span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span>
            </button>
            <div class="w-px h-6 bg-outline-variant/30 mx-2"></div>
            <button
                class="p-3 text-slate-400 hover:text-primary-container hover:bg-primary-container/10 rounded-xl transition-all duration-200 active:scale-90 flex items-center justify-center">
                <span class="material-symbols-outlined" data-icon="image">image</span>
            </button>
        </div>
    </div>
    <!-- Ambient Background Decor (Subtle soft shapes) -->
    <div
        class="fixed top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-container/5 blur-[100px] pointer-events-none z-0">
    </div>
    <div
        class="fixed bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-secondary-container/10 blur-[80px] pointer-events-none z-0">
    </div>
</body>

</html>
