<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Sanctuary - Notlar</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#f8f9ff" id="theme-color-meta">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Tailwind Configuration -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c7c5d3",
                        "on-primary-fixed-variant": "#373c95",
                        "on-tertiary-container": "#4c225a",
                        "on-tertiary-fixed-variant": "#61356f",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-fixed": "#082007",
                        "surface": "#f8f9ff",
                        "on-primary-container": "#232781",
                        "secondary-container": "#c9e8bf",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "tertiary": "#7b4d88",
                        "on-primary-fixed": "#02026b",
                        "secondary-fixed-dim": "#b1cfa7",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "inverse-primary": "#bfc2ff",
                        "primary-container": "#8e94f2",
                        "surface-container-high": "#dce9ff",
                        "primary": "#4f55ae",
                        "surface-tint": "#4f55ae",
                        "surface-variant": "#d3e4fe",
                        "on-error": "#ffffff",
                        "primary-fixed": "#e0e0ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-fixed": "#310540",
                        "inverse-surface": "#213145",
                        "secondary-fixed": "#ccebc2",
                        "on-secondary-container": "#4f6a49",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed-dim": "#bfc2ff",
                        "tertiary-fixed": "#fad7ff",
                        "on-primary": "#ffffff",
                        "secondary": "#4a6545",
                        "tertiary-fixed-dim": "#eab4f7",
                        "on-secondary-fixed-variant": "#334d2f",
                        "on-surface-variant": "#464652",
                        "outline": "#767683",
                        "surface-container": "#e5eeff",
                        "tertiary-container": "#bd8aca"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem"
                    },
                    "spacing": {
                        "gutter": "1rem",
                        "xs": "0.25rem",
                        "lg": "1.5rem",
                        "md": "1rem",
                        "sm": "0.5rem",
                        "xl": "2.5rem",
                        "layout_margin": "2rem"
                    },
                    "fontFamily": {
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    "fontSize": {
                        "body-sm": ["0.875rem", { "lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "label-caps": ["0.75rem", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-md": ["1rem", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "button": ["0.9375rem", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-lg": ["1.125rem", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "h3": ["1.5rem", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600" }],
                        "h1": ["2.5rem", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h2": ["1.875rem", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for clean minimalist look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        body {
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        .screen {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .screen.active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="bg-background text-on-background font-sans h-screen flex flex-col overflow-hidden selection:bg-primary-container selection:text-on-primary-container transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100">
    
    <!-- APP CONTAINER -->
    <div id="app" class="w-full h-full relative">

        <!-- ============================================== -->
        <!-- SCREEN: HOME -->
        <!-- ============================================== -->
        <div id="screen-home" class="screen active flex-col w-full h-full relative">
            <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-lg shadow-[0_4px_20px_rgba(142,148,242,0.08)] transition-all duration-300">
                <button class="text-[#8E94F2] hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-full p-2 flex items-center justify-center">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h1 class="text-xl font-bold text-slate-800 dark:text-slate-100 tracking-tight">Sanctuary</h1>
                <button class="text-[#8E94F2] hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-full p-2 flex items-center justify-center">
                    <span class="material-symbols-outlined">search</span>
                </button>
            </header>
            
            <main class="flex-1 overflow-y-auto px-6 pt-[100px] pb-[120px] max-w-3xl mx-auto w-full">
                <div class="mb-lg">
                    <h2 class="font-h2 text-h2 text-on-surface dark:text-white mb-sm">Günaydın,</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant dark:text-slate-400 mb-md">Düşüncelerini kaydetmek için harika bir gün.</p>
                    <div class="relative bg-surface-container-low dark:bg-slate-800 rounded-xl flex items-center px-md py-sm focus-within:ring-2 focus-within:ring-primary-container/50 transition-all shadow-sm">
                        <span class="material-symbols-outlined text-outline mr-sm">search</span>
                        <input id="search-input" class="bg-transparent border-none outline-none w-full font-body-md text-body-md text-on-surface dark:text-white placeholder:text-outline/70 focus:ring-0 py-1" placeholder="Notlarda ara..." type="text" />
                    </div>
                </div>
                
                <!-- Notes Container -->
                <div id="notes-list" class="grid grid-cols-2 gap-md">
                    <!-- Dinamik olarak JS ile dolacak -->
                </div>
            </main>
            
            <button onclick="app.navToEditor()" class="fixed bottom-[100px] right-6 md:right-10 bg-[#8E94F2] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(142,148,242,0.4)] hover:-translate-y-1 active:scale-95 transition-all duration-300 z-40 group">
                <span class="material-symbols-outlined text-2xl group-hover:rotate-90 transition-transform duration-300">add</span>
            </button>
        </div>

        <!-- ============================================== -->
        <!-- SCREEN: EDITOR -->
        <!-- ============================================== -->
        <div id="screen-editor" class="screen flex-col w-full h-full relative bg-background dark:bg-slate-900 z-50">
            <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-lg shadow-[0_4px_20px_rgba(142,148,242,0.08)]">
                <button onclick="app.navToHome()" class="text-primary-container hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-full p-2 transition-all duration-300 ease-in-out active:scale-95 flex items-center justify-center">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div id="save-indicator" class="text-xs text-outline-variant dark:text-slate-500 flex items-center gap-1 font-body-sm opacity-0 transition-opacity">
                    <span class="material-symbols-outlined text-[16px]">cloud_done</span> Kaydedildi
                </div>
                <button onclick="app.saveNote()" class="bg-primary-container text-white px-6 py-2 rounded-full font-button shadow-[0_4px_20px_rgba(142,148,242,0.2)] hover:bg-primary transition-all duration-300 active:scale-95">
                    Kaydet
                </button>
            </header>
            
            <main class="flex-grow pt-24 pb-20 px-6 md:px-layout_margin max-w-3xl mx-auto w-full flex flex-col relative z-10">
                <div class="flex items-center gap-3 mb-6 text-outline font-body-sm">
                    <span class="bg-primary-container/10 text-primary-container px-3 py-1 rounded-full text-xs font-medium">Not</span>
                    <span id="note-date">Bugün</span>
                </div>
                
                <input id="note-title" class="w-full bg-transparent border-none outline-none font-h1 text-h2 text-on-background dark:text-white placeholder:text-outline-variant/60 focus:ring-0 p-0 mb-6" placeholder="Başlık" type="text" />
                
                <textarea id="note-content" class="w-full flex-grow bg-transparent border-none outline-none font-body-lg text-on-surface dark:text-slate-300 placeholder:text-outline-variant/50 focus:ring-0 p-0 resize-none leading-relaxed" placeholder="Düşüncelerinizi buraya yazın..."></textarea>
            </main>
            
            <!-- Editor Formatting Bar -->
            <div class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-100/10 shadow-[0_-8px_30px_rgba(142,148,242,0.12)] rounded-t-[32px]">
                <div class="flex items-center gap-2 md:gap-4 max-w-md w-full justify-around px-4">
                    <button class="p-3 text-slate-400 hover:text-primary-container rounded-xl flex items-center justify-center"><span class="material-symbols-outlined">format_bold</span></button>
                    <button class="p-3 text-slate-400 hover:text-primary-container rounded-xl flex items-center justify-center"><span class="material-symbols-outlined">format_italic</span></button>
                    <div class="w-px h-6 bg-outline-variant/30 mx-2"></div>
                    <button class="p-3 text-slate-400 hover:text-primary-container rounded-xl flex items-center justify-center"><span class="material-symbols-outlined">format_list_bulleted</span></button>
                    <button onclick="app.deleteCurrentNote()" class="p-3 text-error hover:bg-error-container/20 rounded-xl flex items-center justify-center ml-auto" title="Notu Sil"><span class="material-symbols-outlined">delete</span></button>
                </div>
            </div>
            
            <!-- Ambient Background Decor -->
            <div class="fixed top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-container/5 blur-[100px] pointer-events-none z-0"></div>
        </div>

        <!-- ============================================== -->
        <!-- SCREEN: SECURE -->
        <!-- ============================================== -->
        <div id="screen-secure" class="screen flex-col w-full h-full relative">
            <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
                <div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-primary-fixed/40 dark:bg-primary-fixed/10 blur-[120px]"></div>
                <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed/30 dark:bg-tertiary-fixed/10 blur-[100px]"></div>
            </div>
            <main class="relative z-10 flex-1 flex flex-col items-center justify-center px-layout_margin pb-24">
                <div class="w-full max-w-sm flex flex-col items-center bg-surface-container-lowest/70 dark:bg-slate-800/70 backdrop-blur-2xl rounded-[40px] p-xl shadow-[0_8px_40px_rgba(142,148,242,0.08)] border border-white/50 dark:border-slate-700">
                    <div class="w-16 h-16 rounded-full bg-primary-container/20 flex items-center justify-center mb-lg text-primary shadow-inner">
                        <span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">lock</span>
                    </div>
                    <h1 class="font-h2 text-h2 text-on-surface dark:text-white mb-xs tracking-tight">Şifreli Kasa</h1>
                    <p class="font-body-sm text-body-sm text-on-surface-variant dark:text-slate-400 text-center mb-xl px-4">Gizli notlarınızı buraya ekleyebilirsiniz. Bu özellik şimdilik yapım aşamasındadır.</p>
                    
                    <button class="bg-primary-container text-white px-8 py-3 rounded-full font-button shadow-[0_4px_20px_rgba(142,148,242,0.2)] hover:bg-primary transition-all active:scale-95">
                        Şifre Belirle
                    </button>
                </div>
            </main>
        </div>

        <!-- ============================================== -->
        <!-- SCREEN: SETTINGS -->
        <!-- ============================================== -->
        <div id="screen-settings" class="screen flex-col w-full h-full relative">
            <header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center px-6 py-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-lg shadow-[0_4px_20px_rgba(142,148,242,0.08)]">
                <h1 class="text-xl font-bold text-slate-800 dark:text-slate-100 tracking-tight">Ayarlar</h1>
            </header>
            <main class="flex-1 overflow-y-auto px-6 pt-[100px] pb-[120px] max-w-3xl mx-auto w-full">
                
                <div class="bg-surface-container-lowest dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-surface-container-low dark:border-slate-700 mb-6">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <span class="material-symbols-outlined text-primary-container">dark_mode</span>
                            <div>
                                <h3 class="font-button text-on-surface dark:text-white">Karanlık Mod</h3>
                                <p class="font-body-sm text-on-surface-variant dark:text-slate-400">Göz yormayan tema</p>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="theme-toggle" onchange="app.toggleTheme()" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary-container"></div>
                        </label>
                    </div>
                </div>

                <div class="bg-surface-container-lowest dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-surface-container-low dark:border-slate-700 mb-6">
                    <div class="flex items-center gap-4 mb-4">
                        <span class="material-symbols-outlined text-outline">info</span>
                        <div>
                            <h3 class="font-button text-on-surface dark:text-white">Hakkında</h3>
                            <p class="font-body-sm text-on-surface-variant dark:text-slate-400">Sürüm 1.0 (PWA)</p>
                        </div>
                    </div>
                    <div class="border-t border-slate-100 dark:border-slate-700 my-4"></div>
                    <button onclick="app.clearAllData()" class="w-full text-left flex items-center gap-4 text-error py-2 hover:bg-error-container/20 rounded-lg px-2 transition-colors">
                        <span class="material-symbols-outlined">delete_forever</span>
                        <span class="font-button">Tüm Verileri Temizle</span>
                    </button>
                </div>
                
            </main>
        </div>

        <!-- ============================================== -->
        <!-- BOTTOM NAVIGATION -->
        <!-- ============================================== -->
        <nav id="bottom-nav" class="fixed bottom-0 left-0 w-full z-40 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-100/10 dark:border-slate-800 shadow-[0_-8px_30px_rgba(142,148,242,0.12)] rounded-t-[32px]">
            <!-- Notes -->
            <button onclick="app.switchTab('home')" id="nav-home" class="nav-btn active flex flex-col items-center justify-center rounded-2xl px-5 py-2 transition-transform duration-200 active:scale-90 bg-[#8E94F2]/10 text-[#8E94F2]">
                <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">description</span>
                <span class="text-xs font-medium">Notlar</span>
            </button>
            <!-- Secure -->
            <button onclick="app.switchTab('secure')" id="nav-secure" class="nav-btn flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#8E94F2] transition-transform duration-200 active:scale-90">
                <span class="material-symbols-outlined mb-1">lock</span>
                <span class="text-xs font-medium">Gizli</span>
            </button>
            <!-- Settings -->
            <button onclick="app.switchTab('settings')" id="nav-settings" class="nav-btn flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#8E94F2] transition-transform duration-200 active:scale-90">
                <span class="material-symbols-outlined mb-1">settings</span>
                <span class="text-xs font-medium">Ayarlar</span>
            </button>
        </nav>

    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registered!', reg);
                }).catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
