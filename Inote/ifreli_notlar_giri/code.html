<!DOCTYPE html>

<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Encrypted Notes Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined', sans-serif;
            font-weight: 300;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c7c5d3",
                        "on-primary-fixed-variant": "#373c95",
                        "on-tertiary-container": "#4c225a",
                        "on-tertiary-fixed-variant": "#61356f",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-fixed": "#082007",
                        "surface": "#f8f9ff",
                        "on-primary-container": "#232781",
                        "secondary-container": "#c9e8bf",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "tertiary": "#7b4d88",
                        "on-primary-fixed": "#02026b",
                        "secondary-fixed-dim": "#b1cfa7",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "inverse-primary": "#bfc2ff",
                        "primary-container": "#8e94f2",
                        "surface-container-high": "#dce9ff",
                        "primary": "#4f55ae",
                        "surface-tint": "#4f55ae",
                        "surface-variant": "#d3e4fe",
                        "on-error": "#ffffff",
                        "primary-fixed": "#e0e0ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-fixed": "#310540",
                        "inverse-surface": "#213145",
                        "secondary-fixed": "#ccebc2",
                        "on-secondary-container": "#4f6a49",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed-dim": "#bfc2ff",
                        "tertiary-fixed": "#fad7ff",
                        "on-primary": "#ffffff",
                        "secondary": "#4a6545",
                        "tertiary-fixed-dim": "#eab4f7",
                        "on-secondary-fixed-variant": "#334d2f",
                        "on-surface-variant": "#464652",
                        "outline": "#767683",
                        "surface-container": "#e5eeff",
                        "tertiary-container": "#bd8aca"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "1rem",
                        "xs": "0.25rem",
                        "lg": "1.5rem",
                        "md": "1rem",
                        "sm": "0.5rem",
                        "xl": "2.5rem",
                        "layout_margin": "2rem"
                    },
                    "fontFamily": {},
                    "fontSize": {
                        "body-sm": ["0.875rem", { "lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "label-caps": ["0.75rem", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-md": ["1rem", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "button": ["0.9375rem", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-lg": ["1.125rem", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "h3": ["1.5rem", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600" }],
                        "h1": ["2.5rem", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h2": ["1.875rem", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background min-h-screen flex flex-col relative overflow-hidden font-body-md text-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[70vw] h-[70vw] rounded-full bg-primary-fixed/40 blur-[120px]">
        </div>
        <div
            class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed/30 blur-[100px]">
        </div>
        <div
            class="absolute top-[40%] left-[20%] w-[40vw] h-[40vw] rounded-full bg-surface-container-high/50 blur-[80px]">
        </div>
    </div>
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center px-layout_margin pb-24">
        <div
            class="w-full max-w-sm flex flex-col items-center bg-surface-container-lowest/70 backdrop-blur-2xl rounded-[40px] p-xl shadow-[0_8px_40px_rgba(142,148,242,0.08)] border border-white/50">
            <div
                class="w-16 h-16 rounded-full bg-primary-container/20 flex items-center justify-center mb-lg text-primary shadow-inner">
                <span class="material-symbols-outlined text-[32px]"
                    style="font-variation-settings: 'FILL' 1;">lock</span>
            </div>
            <h1 class="font-h2 text-h2 text-on-surface mb-xs tracking-tight">Şifrenizi Girin</h1>
            <p class="font-body-sm text-body-sm text-on-surface-variant text-center mb-xl px-4">Güvenli notlarınıza
                erişmek için PIN kodunuzu girin.</p>
            <div class="flex gap-lg mb-xl h-4 items-center">
                <div class="w-3.5 h-3.5 rounded-full bg-primary shadow-sm"></div>
                <div class="w-3.5 h-3.5 rounded-full bg-primary shadow-sm"></div>
                <div
                    class="w-3 h-3 rounded-full bg-surface-variant shadow-inner ring-1 ring-inset ring-outline-variant/30">
                </div>
                <div
                    class="w-3 h-3 rounded-full bg-surface-variant shadow-inner ring-1 ring-inset ring-outline-variant/30">
                </div>
            </div>
            <div class="grid grid-cols-3 gap-y-lg gap-x-md w-full px-md">
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">1</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">2</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">3</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">4</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">5</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">6</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">7</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">8</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">9</button>
                <div class="w-[72px] h-[72px] mx-auto"></div>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center font-h3 text-h3 text-on-surface bg-transparent hover:bg-surface-container-high transition-colors active:scale-95 mx-auto">0</button>
                <button
                    class="w-[72px] h-[72px] rounded-full flex items-center justify-center text-on-surface-variant hover:bg-error-container hover:text-on-error-container transition-colors active:scale-95 mx-auto">
                    <span class="material-symbols-outlined">backspace</span>
                </button>
            </div>
            <button
                class="mt-lg font-button text-button text-primary hover:text-on-primary-container transition-colors underline-offset-4 hover:underline">
                Şifremi Unuttum
            </button>
        </div>
    </main>
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-[32px] border-t border-slate-100/10 shadow-[0_-8px_30px_rgba(142,148,242,0.12)]">
        <button
            class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#8E94F2] transition-colors transition-transform duration-200 active:scale-90 group">
            <span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">description</span>
            <span class="font-['Plus_Jakarta_Sans'] text-xs font-medium">Notes</span>
        </button>
        <button
            class="flex flex-col items-center justify-center bg-[#8E94F2]/10 text-[#8E94F2] rounded-2xl px-5 py-2 hover:text-[#8E94F2] transition-colors transition-transform duration-200 active:scale-90">
            <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">lock_open</span>
            <span class="font-['Plus_Jakarta_Sans'] text-xs font-medium">Secure</span>
        </button>
        <button
            class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#8E94F2] transition-colors transition-transform duration-200 active:scale-90 group">
            <span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">settings</span>
            <span class="font-['Plus_Jakarta_Sans'] text-xs font-medium">Settings</span>
        </button>
    </nav>
</body>

</html>
